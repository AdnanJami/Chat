<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Video Call: {{ room_name }}</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; }
        h3 { margin: 10px; }
        #videos { display: flex; justify-content: center; gap: 20px; margin: 20px; flex-wrap: wrap; }
        video { width: 45%; max-width: 600px; border-radius: 8px; background: #000; }
        #local-video { border: 2px solid #4caf50; }
        #remote-video { border: 2px solid #2196f3; }
        .label { font-size: 0.85em; color: #aaa; margin-top: 4px; }
        #controls { margin: 16px; display: flex; justify-content: center; gap: 12px; }
        button {
            padding: 10px 24px; border: none; border-radius: 6px;
            cursor: pointer; font-size: 1em;
        }
        #btn-call { background: #4caf50; color: white; }
        #btn-hangup { background: #f44336; color: white; }
        #btn-mute { background: #ff9800; color: white; }
        #btn-video { background: #2196f3; color: white; }
        #btn-chat { background: #9c27b0; color: white; }
        #status { color: #aaa; font-style: italic; margin: 8px; }
        #notification { color: #ffeb3b; font-style: italic; margin: 8px; min-height: 20px; }
    </style>
</head>
<body>
    <h3>📹 Room: {{ room_name }} | PIN: {{ pin }}</h3>
    <p>Logged in as: <strong>{{ username }}</strong></p>
    <div id="notification"></div>
    <div id="status">Waiting to connect...</div>

    <div id="videos">
        <div>
            <video id="local-video" autoplay muted playsinline></video>
            <div class="label">You ({{ username }})</div>
        </div>
        <div>
            <video id="remote-video" autoplay playsinline></video>
            <div class="label" id="remote-label">Remote</div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-call" onclick="startCall()">📞 Start Call</button>
        <button id="btn-mute" onclick="toggleMute()">🎤 Mute</button>
        <button id="btn-video" onclick="toggleVideo()">📷 Hide Video</button>
        <button id="btn-hangup" onclick="hangUp()">📵 Hang Up</button>
        <button id="btn-chat" onclick="goToChat()">💬 Go to Chat</button>
    </div>

    {{ room_name|json_script:"room-name" }}
    {{ pin|json_script:"pin" }}
    {{ token|json_script:"token" }}

    <script>
        const roomName = JSON.parse(document.getElementById('room-name').textContent);
        const pin = JSON.parse(document.getElementById('pin').textContent);
        const token = JSON.parse(document.getElementById('token').textContent);

        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const statusEl = document.getElementById('status');
        const notifEl = document.getElementById('notification');

        let localStream = null;
        let pc = null;
        let isMuted = false;
        let isVideoOff = false;

        const iceConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
            ]
        };

        // WebSocket signaling
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const sigSocket = new WebSocket(
            protocol + '://' + window.location.host + '/ws/signal/' + roomName + '/' + pin + '/?token=' + token
        );

        sigSocket.onopen = () => {
            setStatus('Connected to signaling server. Start the call or wait for someone.');
        };

        sigSocket.onmessage = async (e) => {
            const data = JSON.parse(e.data);

            if (data.type === 'user-joined') {
                showNotification(`${data.username} joined the call`);
                document.getElementById('remote-label').textContent = data.username;
                // If we already have a stream, initiate offer
                if (localStream) await createOffer();

            } else if (data.type === 'user-left') {
                showNotification(`${data.username} left the call`);
                remoteVideo.srcObject = null;
                setStatus('Remote user disconnected.');

            } else if (data.type === 'offer') {
                await handleOffer(data);

            } else if (data.type === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data));

            } else if (data.type === 'ice-candidate') {
                if (pc && data.candidate) {
                    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                }
            }
        };

        sigSocket.onclose = () => setStatus('Disconnected from signaling server.');

        function sendSignal(data) {
            sigSocket.send(JSON.stringify(data));
        }

        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        function showNotification(msg) {
            notifEl.textContent = msg;
            setTimeout(() => notifEl.textContent = '', 4000);
        }

        async function startCall() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                setStatus('Camera ready. Waiting for others or sending offer...');
                await createOffer();
            } catch (err) {
                setStatus('Camera/mic error: ' + err.message);
            }
        }

        function createPeerConnection() {
            if (pc) pc.close();
            pc = new RTCPeerConnection(iceConfig);

            // Add local tracks
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            // Receive remote stream
            pc.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
                setStatus('Connected!');
            };

            // Send ICE candidates
            pc.onicecandidate = ({ candidate }) => {
                if (candidate) {
                    sendSignal({ type: 'ice-candidate', candidate });
                }
            };

            pc.onconnectionstatechange = () => {
                setStatus('Connection: ' + pc.connectionState);
            };
        }

        async function createOffer() {
            createPeerConnection();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            sendSignal({ type: 'offer', sdp: offer.sdp });
        }

        async function handleOffer(data) {
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    localVideo.srcObject = localStream;
                } catch (err) {
                    setStatus('Camera/mic error: ' + err.message);
                    return;
                }
            }
            createPeerConnection();
            await pc.setRemoteDescription(new RTCSessionDescription(data));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            sendSignal({ type: 'answer', sdp: answer.sdp });
        }

        function toggleMute() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            document.getElementById('btn-mute').textContent = isMuted ? '🎤 Unmute' : '🎤 Mute';
        }

        function toggleVideo() {
            if (!localStream) return;
            isVideoOff = !isVideoOff;
            localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
            document.getElementById('btn-video').textContent = isVideoOff ? '📷 Show Video' : '📷 Hide Video';
        }

        function hangUp() {
            if (pc) { pc.close(); pc = null; }
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            localVideo.srcObject = null;
            remoteVideo.srcObject = null;
            setStatus('Call ended.');
        }

        function goToChat() {
            hangUp();
            window.location.href = '/chat/' + roomName + '/';
        }
    </script>
</body>
</html>
